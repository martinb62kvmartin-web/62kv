name: Build Beat App (APK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip beat-making-app.zip
          echo "=== СОДЕРЖИМОЕ КОРНЯ ПОСЛЕ РАСПАКОВКИ ==="
          ls -F

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # НАСТРОЙКА ОКРУЖЕНИЯ ДЛЯ ANDROID
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # СБОРКА ПРОЕКТА И ИНТЕГРАЦИЯ С CAPACITOR
      - name: Install, Build and Sync Capacitor
        run: |
          # Автоматически находим, куда распаковался package.json
          TARGET_DIR=$(dirname $(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1))
          cd "$TARGET_DIR"
          
          # 1. Обычная веб-сборка сайта Next.js
          npm install
          npm run build
          
          # 2. Синхронизация файлов сайта (папки out) в Android-проект
          npx cap sync android

      # СБОРКА МОБИЛЬНОГО ПРИЛОЖЕНИЯ (APK)
      - name: Build Android APK
        run: |
          TARGET_DIR=$(dirname $(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1))
          cd "$TARGET_DIR"/android
          chmod +x gradlew
          ./gradlew assembleDebug

      # СОХРАНЕНИЕ APK В АРТЕФАКТЫ GITHUB
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beat-app-mobile-apk
          path: |
            **/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

