name: Build Beat App (APK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip beat-making-app.zip
          echo "=== СОДЕРЖИМОЕ КОРНЯ ПОСЛЕ РАСПАКОВКИ ==="
          ls -F

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install, Build and Sync Capacitor
        run: |
          TARGET_DIR=$(dirname $(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1))
          cd "$TARGET_DIR"
          
          # 1. Установка базовых зависимостей проекта
          npm install
          
          # 2. Принудительное включение статического экспорта в next.config
          if [ -f "next.config.js" ]; then
            echo "Настраиваем next.config.js..."
            echo "const nextConfig = { output: 'export', images: { unoptimized: true } }; module.exports = nextConfig;" > next.config.js
          elif [ -f "next.config.mjs" ]; then
            echo "Настраиваем next.config.mjs..."
            echo "/** @type {import('next').NextConfig} */ const nextConfig = { output: 'export', images: { unoptimized: true } }; export default nextConfig;" > next.config.mjs
          else
            echo "Файл конфигурации Next.js не найден. Создаем next.config.js..."
            echo "module.exports = { output: 'export', images: { unoptimized: true } };" > next.config.js
          fi
          
          # 3. Принудительная установка Capacitor
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          
          # 4. Автоматическое создание конфигурации Capacitor
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            echo "Создаем конфигурацию Capacitor..."
            npx cap init "Beat App" "com.martin.beatapp" --web-dir=out
            npx cap add android
          fi
          
          # 5. Веб-сборка сайта Next.js в папку out
          npm run build
          
          # 6. Синхронизация файлов сайта в Android-проект
          npx cap sync android

      - name: Build Android APK
        run: |
          TARGET_DIR=$(dirname $(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1))
          cd "$TARGET_DIR"/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beat-app-mobile-apk
          path: |
            **/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

