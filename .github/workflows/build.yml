name: Build Beat App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip beat-making-app.zip
          echo "=== СОДЕРЖИМОЕ КОРНЯ ПОСЛЕ РАСПАКОВКИ ==="
          ls -F

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install and Build
        run: |
          # Проверяем, есть ли package.json в корне. Если нет — ищем его в подпапках.
          if [ -f "package.json" ]; then
            echo "Файлы проекта найдены в корневой директории."
            npm install
            npm run build
          else
            # Автоматически находим, куда распаковался package.json
            TARGET_DIR=$(dirname $(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1))
            if [ "$TARGET_DIR" != "." ] && [ -n "$TARGET_DIR" ]; then
              echo "Проект найден в подпапке: $TARGET_DIR"
              cd "$TARGET_DIR"
              npm install
              npm run build
            else
              echo "Ошибка: Файл package.json не найден ни в корне, ни в подпапках архива!"
              exit 1
            fi
          fi

