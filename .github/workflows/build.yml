name: Build Beat App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip beat-making-app.zip
          ls

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Объединяем установку и сборку в один шаг с явным переходом в папку
      - name: Install and Build
        run: |
          cd beat-making-app
          npm install
          npm run build
