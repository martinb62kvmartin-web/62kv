name: Build Beat App (APK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip beat-making-app.zip
          echo "=== СОДЕРЖИМОЕ КОРНЯ ПОСЛЕ РАСПАКОВКИ ==="
          ls -F

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Изменяем версию Java на 11 для лучшей совместимости с Gradle в Capacitor
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Автоматически принимаем все лицензии Android SDK перед компиляцией
      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install, Build and Sync Capacitor
        run: |
          TARGET_DIR=$(dirname $(find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/.next/*" | head -n 1))
          cd "$TARGET_DIR"
          
          npm install
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          
          NEXT_TELEMETRY_DISABLED=1 NEXT_DISABLE_SOURCEMAPS=1 NEXT_PRIVATE_SKIP_LINT=1 NEXT_PRIVATE_SKIP_TYPECHECK=1 npx next build
          
          echo "Создаем мобильную конфигурацию..."
          rm -f capacitor.config.ts capacitor.config.json capacitor.config.js
          echo "module.exports = { appId: 'com.martin.beatapp', appName: 'Beat App', webDir: '.next/server/app' };" > capacitor.config.js
          
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          ANDROID_DIR=$(dirname $(find . -maxdepth 4 -name "gradlew" -not -path "*/.next/*" | head -n 1))
          cd "$ANDROID_DIR"
          chmod +x gradlew
          # Добавляем флаг --no-daemon для стабильности сборки в облаке
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beat-app-mobile-apk
          path: |
            **/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
