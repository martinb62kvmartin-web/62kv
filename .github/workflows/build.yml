name: Build Beat App (APK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip beat-making-app.zip
          # Автоматически находим настоящую папку проекта и записываем её в глобальную переменную
          PROJECT_FOLDER=$(dirname $(find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/.next/*" | head -n 1) | sed 's|^\./||')
          echo "REAL_PROJECT_DIR=$PROJECT_FOLDER" >> $GITHUB_ENV
          echo "Проект найден в папке: $PROJECT_FOLDER"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Accept Android Licenses
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Web Packages
        run: |
          cd ${{ env.REAL_PROJECT_DIR }}
          npm install
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          npm install -g pm2

      - name: Build Next.js Project
        run: |
          cd ${{ env.REAL_PROJECT_DIR }}
          NEXT_TELEMETRY_DISABLED=1 NEXT_DISABLE_SOURCEMAPS=1 NEXT_PRIVATE_SKIP_LINT=1 NEXT_PRIVATE_SKIP_TYPECHECK=1 npx next build

      - name: Mirror Web Assets
        run: |
          cd ${{ env.REAL_PROJECT_DIR }}
          PORT=3000 pm2 start "npx next start" --name "next-app"
          sleep 7
          mkdir -p android-web-bundle
          wget --mirror --page-requisites --adjust-extension --no-parent --directory-prefix=android-web-bundle http://localhost:3000/ || true
          mv android-web-bundle/localhost:3000/* android-web-bundle/ 2>/dev/null || true
          rm -rf android-web-bundle/localhost:3000
          if [ ! -f "android-web-bundle/index.html" ]; then
            cp android-web-bundle/index*.html android-web-bundle/index.html 2>/dev/null || echo "<h1>Beat App</h1>" > android-web-bundle/index.html
          fi
          pm2 delete next-app

      - name: Configure Capacitor
        run: |
          cd ${{ env.REAL_PROJECT_DIR }}
          rm -f capacitor.config.ts capacitor.config.json capacitor.config.js
          echo "module.exports = { appId: 'com.martin.beatapp', appName: 'Beat App', webDir: 'android-web-bundle' };" > capacitor.config.js
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          cd ${{ env.REAL_PROJECT_DIR }}/android
          chmod +x gradlew
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export JAVA_HOME=$JAVA_HOME_21_X64
          ./gradlew wrapper --gradle-version 8.13
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: beat-app-mobile-apk
          path: |
            **/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
